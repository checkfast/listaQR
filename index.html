<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Checkfast Lista Digitale + QR-Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/qr-scanner@1.4.1/qr-scanner.umd.min.js"></script>

  <style>
  .logoBox{
    width:100%;
    text-align:center;
    margin-bottom:15px;
  }
  .logoImg{
    max-width:150px;
    height:auto;
  }

  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#2b384b;
    color:#fff;
    margin:0;
    padding:15px;
  }

  h1{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
  }

  .card{
    background:#1f2937;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
  }

  .topButtons{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
    flex-wrap:wrap;
  }

  .topButtons button{
    min-width:140px;
    font-weight:bold;
  }

  #qrBtn{
    background:#e52013;
    color:#fff;
  }

  #listaBtn{
    background:#2563eb;
    color:#fff;
  }

  #cameraCard{
    text-align:center;
  }

  #cameraFeed{
    display:none;
    width:100%;
    max-width:420px;
    margin:10px auto;
    border-radius:12px;
    border:3px solid #fff;
  }

  #searchBox{
    padding:12px;
    border-radius:8px;
    border:none;
    width:70%;
    margin:6px auto;
    display:block;
    font-size:18px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
  }

  th,td{
    padding:10px;
    border-bottom:1px solid #374151;
    font-size:16px;
  }

  th{
    background:#111827;
    position:sticky;
    top:0;
    z-index:2;
    text-align:left;
  }

  tr:nth-child(even){background:#111827}
  tr:nth-child(odd){background:#020617}

  tr.confirmed{
    background:#4CAF50!important;
    color:#fff;
  }

  tr.selected{
    background:#2563eb!important;
    color:#fff;
  }

  button{
    padding:12px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:6px;
    font-size:16px;
  }

  button.primary{background:#e52013;color:#fff}
  button.ok{background:#16a34a;color:#fff}

  .counter{
    margin-top:10px;
    font-size:20px;
    text-align:center;
  }

  .hidden{display:none}

  .popupConfirm{
    position:fixed;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:#fff;
    padding:20px 60px;
    border-radius:999px;
    font-size:25px;
    display:none;
    z-index:999;
    box-shadow:0 6px 20px rgba(0,0,0,0.6);
    animation:pop .3s ease-out;
    text-align:center;
  }

  .popupError{
    background:#dc2626!important;
  }

  @keyframes pop{
    from{transform:translateX(-50%) scale(.9);opacity:0}
    to{transform:translateX(-50%) scale(1);opacity:1}
  }

  .actionsBottom{
    position: sticky;
    top: 10px;
    z-index: 20;
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    margin: 10px 0 15px 0;
    padding: 10px;
    background: #1f2937;
    border-radius: 12px;
    border: 1px solid #374151;
  }

  .actionsBottom button{
    min-width: 100px;
    padding: 8px 10px;
    font-size: 13px;
    margin: 0;
    color: #ffffff;
    border-radius: 8px;
  }

  #showListBtn{background:#2563eb}
  #reportBtn{background:#d97706}
  #registerNewBtn{background:#16a34a}
  </style>
</head>

<body>

  <div class="logoBox">
    <img src="https://static.wixstatic.com/media/2080b2_091288fac9ef49fb875e82a42f827415~mv2.png" alt="Logo" class="logoImg">
  </div>

  <h1>FESTA SANREMO 22 FEBBRAIO</h1>

  <div class="topButtons">
    <button id="qrBtn">QR-CODE</button>
    <button id="listaBtn">LISTA DIGITALE</button>
  </div>

  <div class="card hidden" id="cameraCard">
    <video id="cameraFeed" autoplay playsinline></video>
  </div>

  <div class="card hidden" id="toolsCard">
    <input type="text" id="searchBox" placeholder="Cerca ospite" autofocus>
    <div class="counter"><span id="countChecked">0</span> / <span id="countTotal">0</span></div>
  </div>

  <div class="actionsBottom hidden" id="exportCard">
    <button id="showListBtn">Mostra/Nascondi</button>
    <button id="reportBtn">Report</button>
    <button id="registerNewBtn">Registra nuovo ospite</button>
  </div>

  <div class="card hidden" id="tableCard">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Ospite</th>
          <th>Azienda</th>
          <th>Note</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="card hidden" id="confirmCard">
    <button id="confirmBtn" class="ok" style="width:100%;">CONFERMA</button>
  </div>

  <div class="popupConfirm" id="popupConfirm">Ospite Accreditato</div>

<script>
/* ===== URL WEB APP GOOGLE APPS SCRIPT ===== */
const sheetURL = "https://script.google.com/macros/s/AKfycbzE92_7B0PDEJIxwGodl4M03r9jybsmS-gijtrr3mamDPd3m10XpBf_CuWgsHn8d5Gg/exec";

/* ===== VARIABILI ===== */
let rawRows = [];
let selectedRow = null;
let selectedData = null;
let listVisible = false;
let selectedKey = null;

let qrScanner = null;
let videoStream = null;
let qrInLettura = false;

const searchBox   = document.getElementById('searchBox');
const tbody       = document.getElementById('tbody');
const toolsCard   = document.getElementById('toolsCard');
const tableCard   = document.getElementById('tableCard');
const confirmCard = document.getElementById('confirmCard');
const confirmBtn  = document.getElementById('confirmBtn');
const countChecked= document.getElementById('countChecked');
const countTotal  = document.getElementById('countTotal');
const popupConfirm= document.getElementById('popupConfirm');
const exportCard  = document.getElementById('exportCard');
const showListBtn = document.getElementById('showListBtn');
const reportBtn   = document.getElementById('reportBtn');
const registerNewBtn = document.getElementById('registerNewBtn');

const qrBtn = document.getElementById('qrBtn');
const listaBtn = document.getElementById('listaBtn');
const cameraCard = document.getElementById('cameraCard');
const cameraFeed = document.getElementById('cameraFeed');

const successSound = new Audio("https://static.wixstatic.com/mp3/2080b2_76667a9eefe946fda6bdfc5bc56988e1.mp3");
const errorSound = new Audio("https://static.wixstatic.com/mp3/2080b2_519ca0fcc6764f71a29f6cefbeb9e0b3.mp3");

/* ===== FUNZIONE PER LEGGERE CAMPI ANCHE SE APPS SCRIPT CAMBIA MAIUSCOLE/MINUSCOLE ===== */
function leggiCampo(r, nomiPossibili){
  for(const nome of nomiPossibili){
    if(r[nome] !== undefined && r[nome] !== null){
      return r[nome];
    }
  }
  return "";
}

function getNome(r){
  return leggiCampo(r, ["nome", "Nome"]);
}

function getAzienda(r){
  return leggiCampo(r, ["azienda", "Azienda"]);
}

function getNote(r){
  return leggiCampo(r, ["posto", "note", "Note"]);
}

function getConfermato(r){
  return leggiCampo(r, ["confermato", "Confermato"]);
}

function getCodiceID(r){
  return leggiCampo(r, ["codiceID", "CodiceID", "codiceId", "CodiceId", "codiceid", "Codice ID", "codice id"]);
}

/* ===== CARICA LISTA DA SHEET ===== */
async function caricaLista(){
  try{
    const res = await fetch(sheetURL);
    const data = await res.json();
    rawRows = data;
    renderTable();
    toolsCard.classList.remove('hidden');
    exportCard.classList.remove('hidden');
  }catch(err){
    console.error("Errore caricamento:", err);
  }
}

/* ===== CONTATORI ===== */
function aggiornaContatori(){
  const total = rawRows.length;

  const checked = rawRows.filter(r => {
    const v = String(getConfermato(r) || "").trim();
    return v !== "";
  }).length;

  countTotal.textContent = total;
  countChecked.textContent = checked;
}

/* ===== RENDER TABELLA ===== */
function renderTable(){
  tbody.innerHTML = "";
  confirmCard.classList.add('hidden');
  selectedRow = null;
  selectedData = null;

  let q = searchBox.value.trim().toLowerCase();
  let rows = rawRows;

  if(!listVisible && q === ""){
    tableCard.classList.add('hidden');
    aggiornaContatori();
    return;
  }

  if(q !== ""){
    rows = rawRows.filter(r=>{
      return String(getNome(r)).toLowerCase().includes(q) ||
             String(getAzienda(r)).toLowerCase().includes(q) ||
             String(getNote(r)).toLowerCase().includes(q);
    });
  }

  if(rows.length > 0){
    tableCard.classList.remove('hidden');
  } else {
    tableCard.classList.add('hidden');
  }

  rows.forEach(r=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${getNome(r) || ''}</td>
      <td>${getAzienda(r) || ''}</td>
      <td>${getNote(r) || ''}</td>
    `;

    const giaConfermato = String(getConfermato(r) || "").trim() !== "";

    if(giaConfermato){
      tr.classList.add('confirmed');
      tr.style.pointerEvents = 'none';
    }

    const key = String(getNome(r) || '') + '|' + String(getAzienda(r) || '') + '|' + String(getNote(r) || '');

    tr.addEventListener('click', () => {
      if (giaConfermato) return;

      if (tr.classList.contains('selected')) {
        tr.classList.remove('selected');
        selectedRow = null;
        selectedData = null;
        selectedKey = null;
        confirmCard.classList.add('hidden');
        return;
      }

      if (selectedRow) {
        selectedRow.classList.remove('selected');
      }

      tr.classList.add('selected');
      selectedRow = tr;
      selectedData = r;
      selectedKey = key;
      confirmCard.classList.remove('hidden');
    });

    if (selectedKey && key === selectedKey) {
      tr.classList.add('selected');
      selectedRow = tr;
      selectedData = r;
      confirmCard.classList.remove('hidden');
    }

    tbody.appendChild(tr);
  });

  aggiornaContatori();
}

/* ===== POPUP ===== */
function mostraPopup(testo, tipo){
  popupConfirm.textContent = testo;
  popupConfirm.classList.remove('popupError');

  if(tipo === "errore"){
    popupConfirm.classList.add('popupError');
  }

  popupConfirm.style.display = 'block';

  setTimeout(() => {
    popupConfirm.style.display = 'none';
    popupConfirm.classList.remove('popupError');
  }, 1800);
}

/* ===== INVIO DATI A APPS SCRIPT ===== */
async function confermaOspite(dati){

  popupConfirm.textContent = "Ospite accreditato";
  popupConfirm.classList.remove('popupError');
  popupConfirm.style.display = 'block';

  const durata = 300;

  try{
    const res = await fetch(sheetURL, {
      method: 'POST',
      body: JSON.stringify(dati)
    });

    if (!res.ok) {
      popupConfirm.style.display = 'none';
      alert("Errore dal server (" + res.status + ")");
      return;
    }

    setTimeout(() => {
      searchBox.value = "";
      listVisible = false;
      selectedRow = null;
      selectedData = null;
      selectedKey = null;
      confirmCard.classList.add('hidden');

      renderTable();

      popupConfirm.style.display = 'none';

      caricaLista();

    }, durata);

  }catch(err){
    popupConfirm.style.display = 'none';
    alert("Errore di rete o connessione.");
  }
}

/* ===== CONFERMA DA LISTA DIGITALE ===== */
confirmBtn.addEventListener('click', async ()=>{
  if(!selectedData) return;
  await confermaOspite(selectedData);
});

/* ===== RICERCA LISTA DIGITALE ===== */
searchBox.addEventListener('input', () => {
  renderTable();
});

/* ===== MOSTRA / NASCONDI LISTA COMPLETA ===== */
showListBtn.addEventListener('click', () => {
  listVisible = !listVisible;
  if(listVisible) searchBox.value = "";
  renderTable();
});

/* ===== REPORT EXCEL COMPLETO ===== */
reportBtn.addEventListener('click', () => {
  const ws = XLSX.utils.json_to_sheet(rawRows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Report');
  XLSX.writeFile(wb,'report_completo.xlsx');
});

/* ===== NUOVO OSPITE DA CAMPO DI RICERCA ===== */
async function aggiungiNuovoOspiteDaSearch(){
  const nome = (searchBox.value || "").trim();

  if(!nome){
    alert("Scrivi prima nome e cognome dell'ospite nel campo di ricerca");
    searchBox.focus();
    return;
  }

  const datiNuovo = {
    azione: "aggiungi",
    nome: nome,
    azienda: "",
    posto: "",
    confermato: "SI"
  };

  await confermaOspite(datiNuovo);

  searchBox.value = "";
  await caricaLista();

  alert("Ospite registrato e accreditato.");
}

registerNewBtn.addEventListener('click', async ()=>{
  registerNewBtn.disabled = true;
  const oldText = registerNewBtn.textContent;
  registerNewBtn.textContent = "Registrazione in corso...";

  try{
    await aggiungiNuovoOspiteDaSearch();
  }catch(err){
    console.error("Errore registrazione nuovo ospite:", err);
    alert("Si è verificato un errore nella registrazione. Riprova.");
  }finally{
    registerNewBtn.disabled = false;
    registerNewBtn.textContent = oldText;
  }
});

/* ===== PULSANTE LISTA DIGITALE ===== */
listaBtn.addEventListener('click', async () => {
  await stopCamera();

  cameraCard.classList.add('hidden');
  cameraFeed.style.display = "none";

  toolsCard.classList.remove('hidden');
  exportCard.classList.remove('hidden');

  searchBox.focus();
});

/* ===== PULSANTE QR-CODE ===== */
qrBtn.addEventListener('click', async () => {
  await startCamera();
});

/* ===== AVVIO FOTOCAMERA ===== */
async function startCamera(){
  try{
    qrInLettura = false;

    cameraCard.classList.remove('hidden');
    cameraFeed.style.display = "block";

    toolsCard.classList.remove('hidden');
    exportCard.classList.remove('hidden');

    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    cameraFeed.srcObject = videoStream;

    if(!qrScanner){
      qrScanner = new QrScanner(cameraFeed, result => {
        handleQR(result);
      }, {
        highlightScanRegion: true,
        highlightCodeOutline: true
      });
    }

    await qrScanner.start();

  }catch(error){
    alert("Errore nell'attivazione della fotocamera: " + error.message);
  }
}

/* ===== STOP FOTOCAMERA ===== */
async function stopCamera(){
  if(qrScanner){
    qrScanner.stop();
  }

  if(videoStream){
    videoStream.getTracks().forEach(track => track.stop());
    videoStream = null;
  }

  cameraFeed.style.display = "none";
}

/* ===== LETTURA QR-CODE ===== */
async function handleQR(result){
  if(qrInLettura) return;
  qrInLettura = true;

  let codiceLetto = "";

  if(result && result.data){
    codiceLetto = String(result.data).trim();
  } else {
    codiceLetto = String(result).trim();
  }

  if(!codiceLetto){
    qrInLettura = false;
    return;
  }

  await stopCamera();

  const ospite = rawRows.find(r => {
    return String(getCodiceID(r)).trim() === codiceLetto;
  });

  if(!ospite){
    mostraPopup("QR non trovato: " + codiceLetto, "errore");
    try{ errorSound.play(); }catch(e){}
    qrInLettura = false;
    return;
  }

  const giaConfermato = String(getConfermato(ospite) || "").trim() !== "";

  if(giaConfermato){
    mostraPopup("Ospite già accreditato", "errore");
    try{ errorSound.play(); }catch(e){}
    qrInLettura = false;
    return;
  }

  try{
    if(navigator.vibrate){
      navigator.vibrate(700);
    }

    try{ successSound.play(); }catch(e){}

    await confermaOspite(ospite);

  }catch(err){
    mostraPopup("Errore accredito", "errore");
  }

  qrInLettura = false;
}

/* ===== AVVIO ===== */
caricaLista();
setInterval(caricaLista, 5000);
</script>

</body>
</html>
